{% extends 'base.html' %}
{% block title %}
  Sign Up
{% endblock %}

{% block extra_css %}
  <style>
    .btn-signup-page {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #7c3aed, #2563eb);
      color: #fff;
      font-weight: bold;
      transition: 0.3s;
    }
    
    .btn-signup-page:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.6);
    }
    
    .login-link {
      color: #c4b5fd;
      text-decoration: none;
    }
    
    .login-link:hover {
      color: #fff;
    }
  </style>
{% endblock %}

{% block start %}
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5">
        <div class="glass-card p-5">
          <div class="text-center mb-4">
            <h2><i class="fas fa-user-plus me-2"></i>Create Account</h2>
            <p>Register yourself to continue.</p>
          </div>

          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label class="mb-2"><i class="fas fa-user me-1"></i>First Name</label>
              <input type="text" name="first_name" class="form-control" placeholder="Enter First Name" required />
            </div>

            <div class="mb-3">
              <label class="mb-2"><i class="fas fa-user me-1"></i>Last Name</label>
              <input type="text" name="last_name" class="form-control" placeholder="Enter Last Name" required />
            </div>

            <div class="mb-3">
              <label class="mb-2"><i class="fas fa-at me-1"></i>Username</label>
              <input type="text" name="username" class="form-control" placeholder="Choose Username" required />
            </div>

            <div class="mb-3">
              <label class="mb-2"><i class="fas fa-lock me-1"></i>Password</label>
              <input type="password" name="password" class="form-control" placeholder="Enter Password" required />
            </div>

            <div class="mb-4">
              <label class="mb-2"><i class="fas fa-lock me-1"></i>Confirm Password</label>
              <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required />
            </div>

            <button class="btn-signup-page" type="submit"><i class="fas fa-user-check me-2"></i>Create Account</button>
          </form>

          <div class="text-center mt-4">
            <p class="mb-0 text-white">
              Already have an account?
              <a href="/login_page/" class="login-link">Login</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
